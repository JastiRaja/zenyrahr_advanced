# Copy to application.properties for local development (application.properties is gitignored).
# On AWS, prefer environment variables or a mounted config file generated from Secrets Manager.

spring.application.name=zenyraHR

spring.datasource.url=jdbc:postgresql://localhost:5432/hrms1
spring.datasource.username=postgres
spring.datasource.password=CHANGE_ME
spring.jpa.hibernate.ddl-auto=update

# JWT: set a strong secret in production (e.g. 256-bit random, base64-encoded)
# app.jwt.secret=

# AWS S3 (or use IAM role on EC2/ECS and omit static keys if you migrate to DefaultCredentialsProvider)
aws.access-key=
aws.secret-key=
aws.region=ap-south-1
aws.bucket-name=
aws.profile-folder=profile-pictures
aws.document-folder=documents
aws.travel-folder=travelrequests
aws.leaveRequest_folder=leaveRequest_folder
aws.expenses-folder=expenses
aws.presigned-url-duration=604800

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

brevo.api.key=
brevo.sender.email=
brevo.sender.name=ZenyraHR

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

app.local-storage.base-dir=uploads
app.data.encryption.strict=false
app.data.encryption.backfill-on-startup=false
app.data.encryption.backfill-batch-size=200

# --- Production (set on the host instead of duplicating this file) ---
# SPRING_PROFILES_ACTIVE=prod
# SPRING_DATASOURCE_URL=jdbc:postgresql://your-rds.region.rds.amazonaws.com:5432/hrms?sslmode=require
# SPRING_DATASOURCE_USERNAME=
# SPRING_DATASOURCE_PASSWORD=
