# Production profile: activate with SPRING_PROFILES_ACTIVE=prod (systemd, ECS, Elastic Beanstalk, etc.)
# Keep secrets out of files: use environment variables, SSM Parameter Store, or Secrets Manager.

spring.jpa.hibernate.ddl-auto=validate

logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.zenyrahr.hrms=INFO

# Actuator: expose only health for load balancers and orchestrators
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Pool sizing: tune to RDS max_connections and instance size (defaults are often too low under load)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
